services:
  settings:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: jadwal_masjid_web_app-settings
    restart: always
    environment:
      - NODE_ENV=production
      - PORT=4000
      - NEXT_PUBLIC_API_URL=http://localhost:4000
      - DB_HOST=mysql_db
      - DB_USER=root
      - DB_PASSWORD=localhost
      - DB_NAME=jadwal_masjid
    ports:
      - "4000:4000"
    networks:
      - mynetwork
networks:
   mynetwork:
    external: true
